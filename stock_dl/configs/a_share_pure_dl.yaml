# A股数据 - 方案A: 纯深度学习 (GRU + Transformer)
# 不使用LightGBM，纯GRU-Transformer模型

data_dir: ../A股数据
output_dir: outputs_scheme_a

# 数据时间范围
start_date: "20180101"
end_date: auto
train_end: "20241231"
val_end: auto

# 股票池: all = 非ST、非北交所
universe: all
seq_len: 20
label_horizon: 1

# 特征配置
features:
  use_metric: true
  use_moneyflow: true
  use_market: true
  use_news: true
  cross_section_rank: true
  fill_missing: true

# 模型配置: GRU-Transformer
model:
  name: gru_transformer
  d_model: 96
  nhead: 4
  num_layers: 2
  dim_feedforward: 192
  head_hidden: 96
  gru_hidden: 48
  dropout: 0.22

# 训练配置
train:
  batch_size: 1024
  epochs: 18
  lr: 0.0003
  weight_decay: 0.0001
  early_stop_patience: 5
  early_stop_metric: val_ic
  target_col: label_rank
  loss: ic
  huber_beta: 0.5
  date_batch: true
  rank_loss_weight: 0.08
  direction_loss_weight: 0.03
  rank_top_frac: 0.2
  label_smoothing: 0.0
  focal_gamma: 0.0
  grad_clip: 1.0
  warmup_epochs: 3
  num_workers: 4
  prefetch_factor: 2
  amp: true
  matmul_precision: high
  max_minutes: 330
  seed: 42

# LightGBM: 禁用（方案A不使用）
lgbm:
  enabled: false

# 集成配置: 纯DL模式，alpha=1.0
ensemble:
  alpha: 1.0
  alpha_grid: [1.0]

# wandb配置
wandb:
  enabled: true
  entity: avawang1031
  project: my-awesome-project
  run_name: stock-dl-scheme-a-pure-dl
  group: finalex-scheme-a
  mode: online
  tags: [stock-dl, gru-transformer, pure-dl, a-share, scheme-a]
  notes: "方案A: 纯深度学习 GRU-Transformer，不使用LightGBM"
  watch: false
  watch_log_freq: 200
  log_artifacts: true

# 策略配置
strategy:
  n_hold: 30
  k_trade: 1
  initial_cash: 1000000
  cost_rate: 0.0003
  slippage: 0.0005
  auto_tune: true
  n_hold_grid: [10, 15, 20, 30, 40, 50]
  k_trade_grid: [1, 2, 3]
  turnover_penalty: 0.005
  risk_filter: true
  max_abs_pct_chg: 9.5
  min_amount_quantile: 0.05
  max_volatility_quantile: 0.98
  min_list_age_years: 0.25
  max_mv_quantile: 0.99
  min_mv_quantile: 0.02
  max_ret_cut: 8.0
  adaptive_hold: true
  adaptive_min_hold: 15
  adaptive_max_hold: 50
  adaptive_low_vol_pct: 0.2
  adaptive_high_vol_pct: 0.8
  adaptive_lookback: 250
  momentum_filter: true
  momentum_rank_col: rank_ret_5d
  min_momentum_rank: 0.2
  dynamic_k: true
  score_gap_low: 0.02
  score_gap_high: 0.10
  dynamic_k_step: 2
  dynamic_position: true
  min_position_ratio: 0.80
  force_80percent_position: true
  enforce_t1: true
  limit_pct_chg: 9.5
  position_floor_buffer: 0.02
  base_position_ratio: 0.90
  max_position_ratio: 1.00
  position_confidence_weight: 0.08
  position_vol_weight: 0.12
  position_score_z_low: 0.40
  position_score_z_high: 1.20
  dynamic_position_sell_down: true
  use_long_short: false
  short_ratio: 0.5
  use_risk_parity: false
  max_positions_per_industry: 5
