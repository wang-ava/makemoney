data_dir: ../documents-export-2026-5-19
output_dir: outputs_server8h

# 服务器 8 小时窗口默认配置：对齐当前 best trial，质量优先，并给后处理和可视化留出余量。
start_date: "20180101"
end_date: "20260518"
train_end: "20241231"
val_end: "20260518"

universe: all
seq_len: 20
label_horizon: 1

features:
  use_metric: true
  use_moneyflow: true
  use_market: true
  use_news: true
  cross_section_rank: true
  fill_missing: true

model:
  name: gru_transformer
  d_model: 96
  nhead: 4
  num_layers: 2
  dim_feedforward: 192
  head_hidden: 96
  gru_hidden: 48
  dropout: 0.22

train:
  batch_size: 1024
  epochs: 18
  lr: 0.0003
  weight_decay: 0.0001
  early_stop_patience: 5
  early_stop_metric: val_ic
  target_col: label_rank
  loss: ic
  huber_beta: 0.5
  date_batch: true
  rank_loss_weight: 0.08
  direction_loss_weight: 0.03
  rank_top_frac: 0.2
  label_smoothing: 0.0
  focal_gamma: 0.0
  grad_clip: 1.0
  warmup_epochs: 3
  num_workers: 4
  prefetch_factor: 2
  amp: true
  matmul_precision: high
  max_minutes: 330
  seed: 42

lgbm:
  enabled: true
  objective: lambdarank
  num_boost_round: 300
  early_stopping_rounds: 35
  ndcg_eval_at: [10, 20, 30]
  num_leaves: 31
  learning_rate: 0.04
  feature_fraction: 0.8
  bagging_fraction: 0.8
  bagging_freq: 5
  min_data_in_leaf: 80
  lambda_l2: 2.0
  num_threads: 16
  log_period: 20
  seed: 42

ensemble:
  alpha: 0.55
  alpha_grid: [0.35, 0.45, 0.55, 0.65, 0.75]

wandb:
  enabled: true
  entity: avawang1031
  project: my-awesome-project
  run_name: stock-dl-server8h
  group: finalex
  mode: online
  tags: [stock-dl, server-8h, gru-transformer, lambdarank, finalex]
  notes: "8-hour best-trial preset: GRU-Transformer, LambdaRank and dynamic position strategy with an 80% floor."
  watch: false
  watch_log_freq: 200
  log_artifacts: true

strategy:
  n_hold: 30
  k_trade: 1
  initial_cash: 1000000
  cost_rate: 0.0003
  slippage: 0.0005
  auto_tune: true
  n_hold_grid: [10, 15, 20, 30, 40, 50]
  k_trade_grid: [1, 2, 3]
  turnover_penalty: 0.005
  risk_filter: true
  max_abs_pct_chg: 9.5
  min_amount_quantile: 0.05
  max_volatility_quantile: 0.98
  min_list_age_years: 0.25
  max_mv_quantile: 0.99
  min_mv_quantile: 0.02
  max_ret_cut: 8.0
  adaptive_hold: true
  adaptive_min_hold: 15
  adaptive_max_hold: 50
  adaptive_low_vol_pct: 0.2
  adaptive_high_vol_pct: 0.8
  adaptive_lookback: 250
  momentum_filter: true
  momentum_rank_col: rank_ret_5d
  min_momentum_rank: 0.2
  dynamic_k: true
  score_gap_low: 0.02
  score_gap_high: 0.10
  dynamic_k_step: 2
  dynamic_position: true
  min_position_ratio: 0.80
  position_floor_buffer: 0.02
  base_position_ratio: 0.90
  max_position_ratio: 1.00
  position_confidence_weight: 0.08
  position_vol_weight: 0.12
  position_score_z_low: 0.40
  position_score_z_high: 1.20
  dynamic_position_sell_down: true
  use_long_short: false
  short_ratio: 0.5
  use_risk_parity: false
  max_positions_per_industry: 5
