data_dir: ../documents-export-2026-5-19
output_dir: outputs

# quick.yaml 用于本地快速试跑；default.yaml 面向正式训练/报告。
start_date: "20180101"
end_date: "20260518"
train_end: "20241231"
val_end: "20260518"

# hs300 | all （all = 非ST、非北交所）
universe: all
seq_len: 20
label_horizon: 1

features:
  use_metric: true
  use_moneyflow: true
  use_market: true
  use_news: true
  cross_section_rank: true
  fill_missing: true

# 模型选择：gru_transformer, temporal_attention, bilstm_attention, gru_attention, temporal_cnn, inception_time
model:
  name: gru_transformer
  d_model: 128
  nhead: 4
  num_layers: 2
  dim_feedforward: 256
  head_hidden: 128
  dropout: 0.2

train:
  batch_size: 1024
  epochs: 30
  lr: 0.0003
  weight_decay: 0.0001
  early_stop_patience: 8
  early_stop_metric: val_ic
  target_col: label_rank
  loss: ic
  huber_beta: 0.5
  date_batch: true
  rank_loss_weight: 0.1
  direction_loss_weight: 0.05
  rank_top_frac: 0.2
  label_smoothing: 0.05
  focal_gamma: 2.0
  grad_clip: 1.0
  warmup_epochs: 3
  num_workers: 0
  seed: 42

lgbm:
  enabled: true
  objective: lambdarank
  num_boost_round: 500
  early_stopping_rounds: 50
  ndcg_eval_at: [10, 20, 30]
  num_leaves: 63
  learning_rate: 0.05
  feature_fraction: 0.8
  bagging_fraction: 0.8
  bagging_freq: 5
  min_data_in_leaf: 50
  lambda_l2: 1.0
  seed: 42

ensemble:
  alpha: 0.6
  alpha_grid: [0.3, 0.4, 0.5, 0.6, 0.7]

wandb:
  enabled: true
  entity: avawang1031
  project: my-awesome-project
  run_name: stock-dl-full
  group: finalex
  mode: online
  tags: [stock-dl, gru-transformer, lambdarank, finalex]
  notes: "Stock prediction full pipeline with GRU-Transformer, LambdaRank and dynamic strategy."
  watch: gradients
  watch_log_freq: 100
  log_artifacts: true

strategy:
  n_hold: 20
  k_trade: 3
  initial_cash: 1000000
  cost_rate: 0.0003
  slippage: 0.0005
  auto_tune: true
  n_hold_grid: [5, 10, 15, 20, 30, 50]
  k_trade_grid: [1, 2, 3, 5]
  turnover_penalty: 0.005
  risk_filter: true
  max_abs_pct_chg: 9.5
  min_amount_quantile: 0.05
  max_volatility_quantile: 0.98
  min_list_age_years: 0.25
  max_mv_quantile: 0.95
  min_mv_quantile: 0.05
  max_ret_cut: 8.0
  adaptive_hold: true
  adaptive_min_hold: 10
  adaptive_max_hold: 30
  adaptive_low_vol_pct: 0.2
  adaptive_high_vol_pct: 0.8
  adaptive_lookback: 250
  momentum_filter: true
  momentum_rank_col: rank_ret_5d
  min_momentum_rank: 0.2
  dynamic_k: true
  score_gap_low: 0.02
  score_gap_high: 0.10
  dynamic_k_step: 2
  use_long_short: false
  short_ratio: 0.5
